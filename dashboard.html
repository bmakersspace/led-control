<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LED Control</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1a1a2e;
        color: white;
        margin: 0;
      }
      h1 {
        margin-bottom: 40px;
      }
      .btn {
        padding: 20px 50px;
        font-size: 1.4rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin: 10px;
        transition: transform 0.1s;
      }
      .btn:active {
        transform: scale(0.95);
      }
      #onBtn {
        background: #00d4aa;
        color: #000;
      }
      #offBtn {
        background: #e94560;
        color: #fff;
      }
      #status {
        margin-top: 30px;
        font-size: 0.9rem;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h1>💡 LED Control</h1>
    <div>
      <button class="btn" id="onBtn" onclick="send('ON')">Turn ON</button>
      <button class="btn" id="offBtn" onclick="send('OFF')">Turn OFF</button>
    </div>
    <p id="status">Connecting...</p>

    <script>
      const topic = "braxton/led/control"; // ← must match your Arduino sketch!

      const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

      client.on("connect", () => {
        document.getElementById("status").textContent =
          "✅ Connected to broker";
      });

      client.on("error", (err) => {
        document.getElementById("status").textContent = "❌ Connection error";
      });

      function send(command) {
        client.publish(topic, command);
        document.getElementById("status").textContent =
          `Sent: ${command} @ ${new Date().toLocaleTimeString()}`;
      }
    </script>
  </body>
</html>
